<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 680"
     role="img" aria-labelledby="mtTitle mtDesc" preserveAspectRatio="xMidYMid meet">
  <title id="mtTitle">The Prologue&#8217;s macro-tense spine &#8212; being, becoming, and resulting-state along one line</title>
  <desc id="mtDesc">The Prologue&#8217;s governing verb-tenses laid out left to right along one line: a tight cluster of four &#7974;&#957; (was) at the opening, a step down at the turn where the tense becomes &#7952;&#947;&#941;&#957;&#949;&#964;&#959; (came to be) and &#8003; &#947;&#941;&#947;&#959;&#957;&#949;&#957; (what has come to be), and the being-tense &#7974;&#957; recurring down the length of the Prologue.</desc>

  <style>
    .gk      { font-family:'SBL BibLit','Cardo','Source Serif 4',Georgia,serif; fill:currentColor; }
    .ink     { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; }
    .meta    { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta, #6b6b6b); }
    .note    { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta, #6b6b6b); font-style:italic; }
    .spine   { fill:none; stroke:var(--color-gold, #b8860b); stroke-width:2.6; stroke-linejoin:round; stroke-linecap:round; }
    .node    { fill:var(--color-gold, #b8860b); }
    .nodeg   { fill:var(--color-meta, #6b6b6b); }
    .brk     { stroke:var(--color-meta, #6b6b6b); stroke-width:1; fill:none; }
    .tick    { stroke:var(--color-meta, #6b6b6b); stroke-width:1.2; fill:none; }
    .rule    { stroke:var(--color-meta, #6b6b6b); stroke-width:1; opacity:.5; }
  </style>

  <!-- ===== header : the figure named + the three tense terms ===== -->
  <text class="meta" x="630" y="72" text-anchor="middle" font-size="20">The macro-tense spine &#8212; the Prologue&#8217;s governing tenses, read along the line (in time)</text>

  <text class="gk"   x="276" y="108" text-anchor="start" font-size="22">&#7974;&#957;</text>
  <text class="meta" x="312" y="108" text-anchor="start" font-size="21">&#8212; being</text>
  <text class="gk"   x="430" y="108" text-anchor="start" font-size="22">&#7952;&#947;&#941;&#957;&#949;&#964;&#959;</text>
  <text class="meta" x="534" y="108" text-anchor="start" font-size="21">&#8212; coming-to-be</text>
  <text class="gk"   x="722" y="108" text-anchor="start" font-size="22">&#8003; &#947;&#941;&#947;&#959;&#957;&#949;&#957;</text>
  <text class="meta" x="842" y="108" text-anchor="start" font-size="21">&#8212; resulting-state</text>
  <line class="rule" x1="276" y1="124" x2="984" y2="124"/>

  <!-- ===== the spine (baseline that dips once, at the turn) ===== -->
  <path class="spine" d="M100 472 L318 472 L332 500 L462 500 L476 472 L1120 472"/>

  <!-- being cluster : four &#7974;&#957; at the opening (vv. 1-2) -->
  <circle class="node" cx="110" cy="472" r="5"/>
  <circle class="node" cx="152" cy="472" r="5"/>
  <circle class="node" cx="194" cy="472" r="5"/>
  <circle class="node" cx="236" cy="472" r="5"/>
  <text class="gk" x="110" y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="gk" x="152" y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="gk" x="194" y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="gk" x="236" y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <path class="brk" d="M106 510 L106 516 L240 516 L240 510"/>
  <text class="meta" x="173" y="534" text-anchor="middle" font-size="19">four times &#183; vv. 1&#8211;2</text>
  <path class="tick" d="M106 550 L106 556 L254 556 L254 550"/>
  <text class="meta" x="180" y="574" text-anchor="middle" font-size="18">1:1&#8211;3</text>

  <!-- the turn : the tense steps down to &#7952;&#947;&#941;&#957;&#949;&#964;&#959; -->
  <circle class="node" cx="360" cy="500" r="5"/>
  <circle class="node" cx="406" cy="500" r="5"/>
  <text class="gk" x="360" y="523" text-anchor="middle" font-size="22">&#7952;&#947;&#941;&#957;&#949;&#964;&#959;</text>
  <text class="gk" x="406" y="544" text-anchor="middle" font-size="22">&#7952;&#947;&#941;&#957;&#949;&#964;&#959;</text>
  <path class="brk" d="M338 556 L338 562 L430 562 L430 556"/>
  <text class="ink" x="384" y="580" text-anchor="middle" font-size="19">the tense turns</text>

  <!-- resulting-state : &#8003; &#947;&#941;&#947;&#959;&#957;&#949;&#957; at the v. 3 / v. 4 boundary -->
  <circle class="nodeg" cx="452" cy="500" r="5.5"/>
  <text class="gk" x="452" y="486" text-anchor="middle" font-size="22">&#8003; &#947;&#941;&#947;&#959;&#957;&#949;&#957;</text>

  <!-- being recurrence : &#7974;&#957; down the Prologue's length -->
  <circle class="node" cx="660"  cy="472" r="5"/>
  <circle class="node" cx="740"  cy="472" r="5"/>
  <circle class="node" cx="1000" cy="472" r="5"/>
  <circle class="node" cx="1120" cy="472" r="5"/>
  <text class="gk" x="660"  y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="gk" x="740"  y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="gk" x="1000" y="459" text-anchor="middle" font-size="23">&#7974;&#957;</text>
  <text class="meta" x="660"  y="491" text-anchor="middle" font-size="18">9</text>
  <text class="meta" x="740"  y="491" text-anchor="middle" font-size="18">10</text>
  <text class="meta" x="1000" y="491" text-anchor="middle" font-size="18">15</text>
  <text class="meta" x="1120" y="491" text-anchor="middle" font-size="18">18</text>
  <text class="note" x="838" y="548" text-anchor="middle" font-size="19">the being-tense recurs the Prologue&#8217;s length</text>

  <!-- ===== movement labels (secondary) ===== -->
  <text class="meta" x="300"  y="642" text-anchor="middle" font-size="22">Foyer &#183; vv. 1&#8211;5</text>
  <text class="meta" x="690"  y="642" text-anchor="middle" font-size="22">History &#183; vv. 6&#8211;13</text>
  <text class="meta" x="1035" y="642" text-anchor="middle" font-size="22">Closure &#183; vv. 14&#8211;18</text>
</svg>
