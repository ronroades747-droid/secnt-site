<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560"
     role="img" aria-labelledby="cpTitle cpDesc" preserveAspectRatio="xMidYMid meet">
  <title id="cpTitle">The creational pivot — the macro-tense spine's turn and return at John 1:3–4</title>
  <desc id="cpDesc">The macro-tense spine at the verse 3 to verse 4 hinge: the eternal being (ἦν) of verses 1–2 turning down into the becoming (ἐγένετο) of verse 3's creation, then rising — by way of the perfect ὃ γέγονεν, the standing result — back into being at verse 4a (ζωὴ ἦν), as the preposition shifts from the outward agency of δι' αὐτοῦ to the in-him locus of ἐν αὐτῷ.</desc>

  <style>
    /* role-based theming interface — one source drives light (page) and dark (slide) */
    .gk        { font-family: 'SBL BibLit','Cardo','Times New Roman',serif; }
    .lt        { font-family: 'Source Serif 4','EB Garamond',Georgia,serif; }
    .ink       { fill: currentColor; }                         /* primary ink  */
    .meta      { fill: var(--color-meta, #6b6b6b); }           /* secondary    */
    .goldtxt   { fill: var(--color-gold, #8a6608); }           /* gold text (AA on light) */
    .accent    { stroke: var(--color-gold, #b8860b); fill: none; }   /* arcs/rules/strokes */
    .node      { fill: var(--color-gold, #b8860b); }           /* nodes        */
    .baseline  { stroke: var(--color-gold, #b8860b); fill: none; opacity: .55; }
    .halo      { fill: var(--color-gold, #b8860b); opacity: .26; }
    .rule      { stroke: var(--color-meta, #9a9384); fill: none; opacity: .8; }
    .leader    { stroke: var(--color-meta, #9a9384); fill: none; opacity: .7; }
    .brk       { stroke: var(--color-meta, #9a9384); fill: none; }
  </style>

  <defs>
    <marker id="cp-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path class="node" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <!-- ============================ LEGEND (top-right) ============================ -->
  <text class="lt goldtxt" x="1372" y="58"  text-anchor="end" font-size="21">Path along the line — the spine (in time)</text>
  <line class="rule" x1="1120" y1="74" x2="1372" y2="74"/>
  <text class="gk ink" x="1372" y="102" text-anchor="end" font-size="21">ἦν — being</text>
  <text class="gk ink" x="1372" y="130" text-anchor="end" font-size="21">ἐγένετο — coming-to-be</text>
  <text class="gk ink" x="1372" y="158" text-anchor="end" font-size="21">ὃ γέγονεν — resulting-state (the bridge)</text>
  <text class="gk ink" x="1372" y="186" text-anchor="end" font-size="21">δι' αὐτοῦ — outward agency (v. 3)</text>
  <text class="gk ink" x="1372" y="214" text-anchor="end" font-size="21">ἐν αὐτῷ — in-him locus (v. 4a)</text>

  <!-- ============================ BASELINE (being level) ======================= -->
  <line class="baseline" x1="125" y1="255" x2="1040" y2="255" stroke-width="1.8"/>

  <!-- ============================ THE SPINE — the V (dip + return) ============== -->
  <!-- descent into becoming, the becoming run, ascent to the bridge -->
  <path class="accent" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"
        d="M375 255 L490 332 L610 332 L735 292"/>
  <!-- the pivot arrow: the return rising back to being at v. 4a -->
  <path class="accent" stroke-width="2.6" stroke-linecap="round"
        marker-end="url(#cp-arrow)" d="M735 292 L928 255"/>

  <!-- ===== Being (ἦν) — the eternal level: four-node cluster over vv. 1–2 ===== -->
  <circle class="node" cx="165" cy="255" r="5"/>
  <circle class="node" cx="225" cy="255" r="5"/>
  <circle class="node" cx="285" cy="255" r="5"/>
  <circle class="node" cx="345" cy="255" r="5"/>
  <text class="gk ink" x="165" y="237" text-anchor="middle" font-size="22">ἦν</text>
  <text class="gk ink" x="225" y="237" text-anchor="middle" font-size="22">ἦν</text>
  <text class="gk ink" x="285" y="237" text-anchor="middle" font-size="22">ἦν</text>
  <text class="gk ink" x="345" y="237" text-anchor="middle" font-size="22">ἦν</text>
  <path class="brk" stroke-width="1" d="M153 276 L153 282 L357 282 L357 276"/>
  <text class="lt meta" x="255" y="302" text-anchor="middle" font-size="19">four times · vv. 1–2</text>

  <!-- ===== The turn ===== -->
  <text class="lt ink" x="455" y="326" text-anchor="end" font-size="19">the tense turns</text>

  <!-- ===== Becoming (ἐγένετο) — the lower level: two nodes at v. 3 ===== -->
  <circle class="node" cx="510" cy="332" r="5"/>
  <circle class="node" cx="575" cy="332" r="5"/>
  <text class="gk ink" x="500" y="360" text-anchor="middle" font-size="22">ἐγένετο</text>
  <text class="gk ink" x="592" y="384" text-anchor="middle" font-size="22">ἐγένετο</text>
  <text class="gk ink" x="540" y="426" text-anchor="middle" font-size="24">πάντα δι' αὐτοῦ ἐγένετο</text>
  <text class="lt meta" x="540" y="452" text-anchor="middle" font-size="19">outward agency · δι' αὐτοῦ</text>

  <!-- ===== The bridge — ὃ γέγονεν : the perfect, the hinge (heaviest) ===== -->
  <circle class="halo" cx="735" cy="292" r="14"/>
  <circle class="node" cx="735" cy="292" r="7.5"/>
  <text class="gk ink" x="735" y="271" text-anchor="middle" font-size="24">ὃ γέγονεν</text>
  <path class="leader" stroke-width=".9" d="M735 301 L758 346"/>
  <text class="lt ink" x="762" y="362" text-anchor="middle" font-size="21">the perfect — the standing result,</text>
  <text class="lt ink" x="762" y="386" text-anchor="middle" font-size="21">the bridge.</text>

  <!-- ===== The return — ζωὴ ἦν at v. 4a (being restored) ===== -->
  <text class="gk ink" x="930" y="237" text-anchor="middle" font-size="23">ζωὴ ἦν</text>
  <text class="lt meta" x="948" y="300" text-anchor="middle" font-size="19">in-him locus · ἐν αὐτῷ</text>

  <!-- ============================ UNIT TICK + MOVEMENT ========================= -->
  <path class="brk" stroke-width="1" d="M160 498 L160 504 L545 504 L545 498"/>
  <text class="lt meta" x="300" y="522" text-anchor="middle" font-size="18">1:1–3</text>
  <text class="lt meta" x="560" y="540" text-anchor="middle" font-size="26">Foyer · vv. 1–5</text>
</svg>
