<svg viewBox="0 0 1260 680" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="caTitle caDesc" preserveAspectRatio="xMidYMid meet"
     font-size="22">
  <title id="caTitle">Coordinate articulation of the Prologue's shape and spine</title>
  <desc id="caDesc">The Prologue's foyer-bracket arcs and macro-tense spine on one baseline, with the two points where they coincide marked — at the opening and, most sharply, at verse 3.</desc>

  <style>
    .arc      { fill:none; stroke:#b8860b; stroke-width:2.4; stroke-linecap:round; }
    .arc-dash { fill:none; stroke:#b7ae9c; stroke-width:2;   stroke-linecap:round; stroke-dasharray:7 6; }
    .spine    { fill:none; stroke:#b8860b; stroke-width:2.6; stroke-linejoin:round; stroke-linecap:round; }
    .node     { fill:#b8860b; }
    .node-g   { fill:#8f8a7e; }
    .tie1     { stroke:#3a342a; stroke-width:1.4; fill:none; }
    .tie2     { stroke:#b8860b; stroke-width:3;   fill:none; stroke-linecap:round; }
    .tie2halo { stroke:#dcc06a; stroke-width:9; opacity:.30; fill:none; stroke-linecap:round; }
    .crown-g  { fill:#c19a3a; stroke:#a8842c; stroke-width:1; }
    .crown-s  { fill:#bcc0c8; stroke:#9aa0a8; stroke-width:1; }
    .rule     { stroke:#c9a961; stroke-width:1; }
    .tick     { stroke:#b8860b; stroke-width:1.2; fill:none; }
    .brk      { stroke:#9a9384; stroke-width:1; fill:none; }
    .leader   { stroke:#b7ae9c; stroke-width:.8; fill:none; }
    .band     { fill:#ece7dd; }

    .gk     { font-family:'SBL BibLit','Cardo','Times New Roman',serif; fill:#1a1a1a; }
    .gk-dim { font-family:'SBL BibLit','Cardo','Times New Roman',serif; fill:#a89f8d; }
    .lbl    { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#6f6a60; }
    .lbl-em { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#37312a; }
    .note   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#8a8276; font-style:italic; }
    .vnum   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#9a9384; }
    .move   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#54504a; }
    .gold   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#8a6608; }
    .clbl   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#37312a; }
    .clbl-d { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:#9a9080; }
    .leg-gk { font-family:'SBL BibLit','Cardo','Times New Roman',serif; fill:#1a1a1a; }
  </style>

  <!-- background -->
  <rect x="0" y="0" width="1260" height="680" fill="#faf7f2"/>

  <!-- ================= LAYER A : the shape (arcs above the line) ================= -->
  <path class="arc" d="M110 452 C110 -30 1120 -30 1120 452"/>
  <path class="arc" style="stroke-width:2.2" d="M360 394 C360 110 1098 110 1098 472"/>
  <path class="arc-dash" d="M480 472 C480 250 940 250 940 472"/>

  <text class="lbl" x="470" y="298" text-anchor="middle" font-size="23" letter-spacing="1.5">ARC 1</text>
  <text class="lbl" x="650" y="360" text-anchor="middle" font-size="23" letter-spacing="1.5">ARC 2</text>

  <!-- crowns + coincidence labels -->
  <path class="crown-g" d="M595 90 L595 80 L605 87 L615 73 L625 87 L635 80 L635 90 Z"/>
  <text class="clbl" x="615" y="113" text-anchor="middle" font-size="22">v. 1 / v. 18</text>

  <path class="crown-g" d="M709 184 L709 174 L719 181 L729 167 L739 181 L749 174 L749 184 Z"/>
  <text class="clbl" x="729" y="208" text-anchor="middle" font-size="22">v. 3 / v. 18</text>

  <text class="clbl-d" x="710" y="286" text-anchor="middle" font-size="21">engaged at John 1:14</text>
  <path class="crown-s" d="M690 308 L690 298 L700 305 L710 291 L720 305 L730 298 L730 308 Z"/>

  <!-- ================= BASELINE + LAYER B : the spine ================= -->
  <path class="spine" d="M100 472 L318 472 L332 500 L462 500 L476 472 L1120 472"/>

  <!-- being cluster -->
  <circle class="node" cx="110" cy="472" r="5"/>
  <circle class="node" cx="152" cy="472" r="5"/>
  <circle class="node" cx="194" cy="472" r="5"/>
  <circle class="node" cx="236" cy="472" r="5"/>
  <text class="gk" x="152" y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="gk" x="194" y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="gk" x="236" y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="vnum" x="110" y="491" text-anchor="middle" font-size="18">1</text>
  <text class="vnum" x="152" y="491" text-anchor="middle" font-size="18">2</text>
  <text class="vnum" x="194" y="491" text-anchor="middle" font-size="18">3</text>
  <text class="vnum" x="236" y="491" text-anchor="middle" font-size="18">4</text>

  <path class="brk" d="M106 510 L106 516 L240 516 L240 510"/>
  <text class="lbl" x="173" y="533" text-anchor="middle" font-size="19">four times · vv. 1–2</text>
  <path class="tick" d="M106 550 L106 556 L254 556 L254 550"/>
  <text class="gold" x="180" y="574" text-anchor="middle" font-size="19">1:1–3</text>

  <!-- the turn -->
  <circle class="node" cx="360" cy="500" r="5"/>
  <circle class="node" cx="406" cy="500" r="5"/>
  <text class="gk" x="360" y="523" text-anchor="middle" font-size="22">ἐγένετο</text>
  <text class="gk" x="406" y="544" text-anchor="middle" font-size="22">ἐγένετο</text>
  <path class="brk" d="M338 556 L338 562 L430 562 L430 556"/>
  <text class="lbl-em" x="384" y="579" text-anchor="middle" font-size="19">the tense turns</text>

  <!-- resulting-state -->
  <circle class="node-g" cx="452" cy="500" r="5.5"/>
  <text class="gk" x="452" y="486" text-anchor="middle" font-size="22">ὃ γέγονεν</text>
  <text class="vnum" x="452" y="523" text-anchor="middle" font-size="18">4</text>

  <!-- being recurrence -->
  <circle class="node" cx="660" cy="472" r="5"/>
  <circle class="node" cx="740" cy="472" r="5"/>
  <circle class="node" cx="1000" cy="472" r="5"/>
  <circle class="node" cx="1120" cy="472" r="5"/>
  <text class="gk" x="660"  y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="gk" x="740"  y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="gk" x="1000" y="459" text-anchor="middle" font-size="23">ἦν</text>
  <text class="vnum" x="660"  y="491" text-anchor="middle" font-size="18">9</text>
  <text class="vnum" x="740"  y="491" text-anchor="middle" font-size="18">10</text>
  <text class="vnum" x="1000" y="491" text-anchor="middle" font-size="18">15</text>
  <text class="vnum" x="1120" y="491" text-anchor="middle" font-size="18">18</text>
  <text class="note" x="830" y="548" text-anchor="middle" font-size="19">the being-tense recurs the Prologue’s length</text>

  <!-- ================= arc-foot Greek labels ================= -->
  <text class="gk" x="104" y="423" text-anchor="middle" font-size="26">πρὸς τὸν</text>
  <text class="gk" x="104" y="449" text-anchor="middle" font-size="26">θεόν</text>

  <text class="gk" x="360" y="326" text-anchor="middle" font-size="26">πάντα</text>
  <text class="gk" x="360" y="352" text-anchor="middle" font-size="26">δι’ αὐτοῦ</text>
  <text class="gk" x="360" y="378" text-anchor="middle" font-size="26">ἐγένετο</text>

  <text class="gk" x="1058" y="412" text-anchor="middle" font-size="26">ἐκεῖνος</text>
  <text class="gk" x="1058" y="438" text-anchor="middle" font-size="26">ἐξηγήσατο</text>

  <text class="gk" x="1186" y="408" text-anchor="middle" font-size="26">εἰς τὸν</text>
  <text class="gk" x="1186" y="434" text-anchor="middle" font-size="26">κόλπον</text>
  <text class="gk" x="1186" y="460" text-anchor="middle" font-size="26">τοῦ πατρός</text>

  <text class="gk-dim" x="545" y="378" text-anchor="middle" font-size="24">ζωή · φῶς</text>
  <text class="gk-dim" x="868" y="378" text-anchor="middle" font-size="24">δόξα</text>

  <!-- ================= LAYER C : ties ================= -->
  <line class="tie1" x1="110" y1="452" x2="110" y2="472"/>
  <line class="tie1" x1="116" y1="452" x2="116" y2="472"/>
  <line class="tie1" x1="110" y1="457" x2="116" y2="467"/>
  <line class="tie1" x1="116" y1="457" x2="110" y2="467"/>
  <path class="leader" d="M254 440 L124 456"/>
  <text class="lbl" x="258" y="399" font-size="20">shared terminus —</text>
  <text class="lbl" x="258" y="418" font-size="20">frame post and</text>
  <text class="lbl" x="258" y="437" font-size="20">being-register,</text>
  <text class="lbl" x="258" y="456" font-size="20">the same words</text>

  <line class="tie2halo" x1="360" y1="400" x2="360" y2="494"/>
  <line class="tie2"     x1="360" y1="398" x2="360" y2="496"/>
  <path class="leader" d="M420 432 L366 452"/>
  <text class="lbl-em" x="424" y="411" font-size="21">the sharpest intersection —</text>
  <text class="lbl-em" x="424" y="433" font-size="21">foyer pole and the spine’s turn,</text>
  <text class="lbl-em" x="424" y="455" font-size="21">on the same words</text>

  <!-- ================= legend (top-right) ================= -->
  <text class="gold"   x="1245" y="50"  text-anchor="end" font-size="22">Arcs above the line — the shape (in space)</text>
  <text class="gold"   x="1245" y="76"  text-anchor="end" font-size="22">Path along the line — the spine (in time)</text>
  <line class="rule" x1="1010" y1="92" x2="1245" y2="92"/>
  <text class="leg-gk" x="1245" y="116" text-anchor="end" font-size="22">ἦν — being</text>
  <text class="leg-gk" x="1245" y="142" text-anchor="end" font-size="22">ἐγένετο — coming-to-be</text>
  <text class="leg-gk" x="1245" y="168" text-anchor="end" font-size="22">ὃ γέγονεν — resulting-state</text>

  <!-- ================= movement band ================= -->
  <rect class="band" x="0" y="600" width="1260" height="80"/>
  <text class="move" x="230"  y="648" text-anchor="middle" font-size="29">Foyer · vv. 1–5</text>
  <text class="move" x="690"  y="648" text-anchor="middle" font-size="29">History · vv. 6–13</text>
  <text class="move" x="1065" y="648" text-anchor="middle" font-size="29">Closure · vv. 14–18</text>
</svg>
