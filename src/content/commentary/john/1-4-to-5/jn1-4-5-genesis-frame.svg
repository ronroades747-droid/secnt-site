<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="gfTitle gfDesc" preserveAspectRatio="xMidYMid meet">
  <title id="gfTitle">The Genesis frame — Genesis 1:1–5 read in the key of the Word, its creation-light and primeval darkness transposed across John 1:4–5.</title>
  <desc id="gfDesc">John 1:4–5 reads the opening of Genesis in the key of the Word. Within a frame of Genesis 1:1–5 that the evangelist has kept open since verse 1, three terms of the creation account are carried across into John's unit: the creation-light of Genesis 1 becomes the light of men in the Word (τὸ φῶς τῶν ἀνθρώπων); the primeval darkness over the deep becomes a darkness set against God (ἡ σκοτία); and the light that God calls into being now shines in the present (φαίνει). Genesis 1's shared light, darkness, and shine vocabulary is registered throughout. A band beneath the frame marks John 1:4–5 as the third sustained engagement with Genesis 1:1–5 in the space of five verses, after 1:1 and 1:3.</desc>

  <style>
    /* --- family theming interface: light page renders from in-file fallbacks;
           dark slide renders when the host sets color / --color-gold / --color-meta --- */
    .gk    { font-family:'SBL BibLit','Cardo','Gentium Plus','Charis SIL','Source Serif 4',Georgia,serif; fill:currentColor; }
    .ink   { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; }
    .lbl   { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); }
    .note  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); font-style:italic; }
    .head  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-goldtext,#8a6608); letter-spacing:0.14em; }
    .field { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-goldtext,#8a6608); letter-spacing:0.2em; }

    .frame { stroke:var(--color-gold,#b8860b); stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .cross { stroke:var(--color-gold,#b8860b); stroke-width:3.2; fill:none; stroke-linecap:round; }
    .axis  { stroke:var(--color-meta,#6b6b6b); stroke-width:1.6; fill:none; stroke-linecap:round; }
    .node  { fill:var(--color-gold,#b8860b); }
    .gring { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:2; }
    .gnode { fill:var(--color-gold,#b8860b); }
    .brk   { stroke:var(--color-meta,#6b6b6b); stroke-width:1; fill:none; }
  </style>

  <defs>
    <marker id="gf-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-gold,#b8860b)"/>
    </marker>
  </defs>

  <!-- ================= descriptive legend (top, secondary) ================= -->
  <text class="note" x="720" y="46" text-anchor="middle" font-size="20">John 1:4–5 reads the opening of Genesis in the key of the Word — the third sustained return to Genesis 1:1–5</text>
  <text class="note" x="720" y="72" text-anchor="middle" font-size="20">in the space of five verses, the creation-light and the primeval darkness transposed across the unit.</text>

  <!-- ================= the Genesis frame (kept open since 1:1) ================= -->
  <text class="head" x="720" y="128" text-anchor="middle" font-size="21">THE GENESIS FRAME · GENESIS 1:1–5</text>
  <rect class="frame" x="70" y="150" width="1300" height="600" rx="6"/>
  <text class="note" x="720" y="192" text-anchor="middle" font-size="18">kept open since 1:1 — the frame that conditions the whole unit</text>

  <!-- ================= column headers ================= -->
  <text class="head" x="330"  y="244" text-anchor="middle" font-size="19">THE CREATION ACCOUNT</text>
  <text class="lbl"  x="330"  y="268" text-anchor="middle" font-size="16">Genesis 1 · the light and the dark of the beginning</text>
  <text class="head" x="1095" y="244" text-anchor="middle" font-size="19">IN THE WORD</text>
  <text class="lbl"  x="1095" y="268" text-anchor="middle" font-size="16">John 1:4–5 · the same terms, read christologically</text>

  <!-- ================= transposition rows ================= -->
  <!-- Row 1 — LIGHT (y center ~ 350) -->
  <text class="ink"  x="330" y="345" text-anchor="middle" font-size="26">the creation-light</text>
  <text class="note" x="330" y="372" text-anchor="middle" font-size="18">the light God calls into being</text>
  <line class="cross" x1="560" y1="345" x2="838" y2="345" marker-end="url(#gf-arrow)"/>
  <text class="field" x="695" y="330" text-anchor="middle" font-size="16">LIGHT</text>
  <text class="gk"   x="1095" y="343" text-anchor="middle" font-size="30">τὸ φῶς τῶν ἀνθρώπων</text>
  <text class="note" x="1095" y="372" text-anchor="middle" font-size="18">now the light <tspan font-style="italic">of men</tspan>, in the Word</text>

  <!-- Row 2 — DARKNESS (y center ~ 490) -->
  <text class="ink"  x="330" y="485" text-anchor="middle" font-size="26">the primeval darkness</text>
  <text class="note" x="330" y="512" text-anchor="middle" font-size="18">the dark over the deep</text>
  <line class="cross" x1="560" y1="485" x2="838" y2="485" marker-end="url(#gf-arrow)"/>
  <text class="field" x="695" y="470" text-anchor="middle" font-size="16">DARKNESS</text>
  <text class="gk"   x="1095" y="483" text-anchor="middle" font-size="30">ἡ σκοτία</text>
  <text class="note" x="1095" y="512" text-anchor="middle" font-size="18">now a darkness set <tspan font-style="italic">against</tspan> God</text>

  <!-- Row 3 — SHINE (y center ~ 630) -->
  <text class="ink"  x="330" y="625" text-anchor="middle" font-size="26">and there was light</text>
  <text class="note" x="330" y="652" text-anchor="middle" font-size="18">the light appears in the beginning</text>
  <line class="cross" x1="560" y1="625" x2="838" y2="625" marker-end="url(#gf-arrow)"/>
  <text class="field" x="695" y="610" text-anchor="middle" font-size="16">SHINE</text>
  <text class="gk"   x="1095" y="623" text-anchor="middle" font-size="30">φαίνει</text>
  <text class="note" x="1095" y="652" text-anchor="middle" font-size="18">shines now — the present tense</text>

  <!-- transposition caption inside frame, low -->
  <text class="lbl" x="720" y="712" text-anchor="middle" font-size="17">the christological transposition — Genesis 1, read in the key of the Word</text>

  <!-- ================= third-engagement band (below frame) ================= -->
  <line class="axis" x1="360" y1="820" x2="1080" y2="820"/>

  <!-- 1:1 — first engagement -->
  <circle class="node" cx="360" cy="820" r="7"/>
  <text class="lbl" x="360" y="800" text-anchor="middle" font-size="18">1:1</text>
  <text class="note" x="360" y="852" text-anchor="middle" font-size="16">in the beginning</text>

  <!-- 1:3 — second engagement -->
  <circle class="node" cx="620" cy="820" r="7"/>
  <text class="lbl" x="620" y="800" text-anchor="middle" font-size="18">1:3</text>
  <text class="note" x="620" y="852" text-anchor="middle" font-size="16">all things through him</text>

  <!-- 1:4–5 — the third, this unit (emphasis) -->
  <circle class="gring" cx="1080" cy="820" r="16"/>
  <circle class="gnode" cx="1080" cy="820" r="9"/>
  <text class="head" x="1080" y="798" text-anchor="middle" font-size="18">1:4–5</text>
  <text class="lbl" x="1080" y="852" text-anchor="middle" font-size="16">this unit · the third return</text>

  <text class="note" x="720" y="884" text-anchor="middle" font-size="18">the third sustained engagement with Genesis 1:1–5 in the space of five verses</text>
</svg>
