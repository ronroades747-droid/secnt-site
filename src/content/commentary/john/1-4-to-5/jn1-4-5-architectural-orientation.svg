<svg viewBox="0 0 1440 700" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="aoTitle aoDesc" preserveAspectRatio="xMidYMid meet">
  <title id="aoTitle">The Johannine Prologue in three movements, with John 1:4–5 at the close of the first movement.</title>
  <desc id="aoDesc">The Prologue laid out as a single horizontal frame of three movements — the Word in the beginning (1:1–5), the Word coming as light (1:6–13), and the Word's glory in the flesh (1:14–18). John 1:4–5 is highlighted at the close of the first movement, the foyer of verses 1–5. An arc carries the correspondence from verse 4 across to verse 14, where the light of verse 4 is disclosed as the glory of verse 14 — one divine self-disclosure; the pairing as a composed frame is drawn provisionally, completing at 1:14. Beneath the frame the Prologue's tense-spine — was, came-to-be, has-come-to-be — runs diachronically toward the incarnation. The diagram locates the unit within the whole Prologue.</desc>

  <style>
    /* --- family theming interface: light page renders from in-file fallbacks;
           dark slide renders when the host sets color / --color-gold / --color-meta / --color-goldtext --- */
    .gk    { font-family:'SBL BibLit','Cardo','Gentium Plus','Charis SIL','Source Serif 4',Georgia,serif; fill:currentColor; }
    .ink   { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; }
    .inkb  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; font-weight:600; }
    .desc  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; font-style:italic; }
    .lbl   { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); }
    .note  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); font-style:italic; }
    .tab   { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); letter-spacing:2px; }
    .glab  { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-goldtext,#8a6608); font-style:italic; }

    .panel { fill:none; stroke:currentColor; stroke-width:1.6; }
    .div   { fill:none; stroke:var(--color-meta,#6b6b6b); stroke-width:1; stroke-dasharray:3 4; }
    .hl    { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:3.4; }
    .rule  { stroke:var(--color-gold,#b8860b); stroke-width:2.4; fill:none; stroke-linecap:round; }
    .spine { stroke:var(--color-gold,#b8860b); stroke-width:2.6; fill:none; stroke-linejoin:round; stroke-linecap:round; }
    .arcS  { stroke:var(--color-gold,#b8860b); stroke-width:2.6; fill:none; stroke-linecap:round; }
    .arcP  { stroke:var(--color-gold,#b8860b); stroke-width:2.2; fill:none; stroke-linecap:round; stroke-dasharray:7 6; }
    .node  { fill:var(--color-gold,#b8860b); }
    .pring { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:2; }
    .brk   { stroke:var(--color-meta,#6b6b6b); stroke-width:1; fill:none; }
    .tick  { stroke:var(--color-gold,#b8860b); stroke-width:1.4; fill:none; }
  </style>

  <defs>
    <marker id="ao-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-gold,#b8860b)"/>
    </marker>
  </defs>

  <!-- ================= descriptive legend (top, secondary) ================= -->
  <text class="note" x="720" y="44" text-anchor="middle" font-size="19">The Prologue in three movements — the Word in the beginning, the Word coming as light, and the Word's glory in the flesh —</text>
  <text class="note" x="720" y="70" text-anchor="middle" font-size="19">with John 1:4–5 set at the close of the first movement, the foyer of verses 1–5.</text>

  <!-- ================= the v.4 / v.14 Foyer pole (arc over the frame) ================= -->
  <!-- solid near-pole half: the light = glory content is established -->
  <path class="arcS" d="M440 253 C560 150 650 150 707 150"/>
  <!-- dashed far-pole half: the deliberate-composed-frame claim is provisional, completing at 1:14 -->
  <path class="arcP" d="M707 150 C764 150 862 150 975 253"/>
  <text class="lbl" x="707" y="126" text-anchor="middle" font-size="16.5">the light of verse 4, disclosed as the glory of verse 14 — one self-disclosure</text>
  <text class="note" x="745" y="202" text-anchor="middle" font-size="15">the pairing as a composed frame completes at 1:14</text>
  <!-- pole markers: near = solid (established), far = hollow (provisional) -->
  <circle class="node"  cx="440" cy="253" r="6"/>
  <circle class="pring" cx="975" cy="253" r="7"/>
  <text class="lbl" x="410" y="250" text-anchor="end"   font-size="15">v. 4</text>
  <text class="lbl" x="1005" y="250" text-anchor="start" font-size="15">v. 14</text>

  <!-- ================= movement tabs ================= -->
  <text class="tab" x="300"  y="242" text-anchor="middle" font-size="13.5">FIRST MOVEMENT</text>
  <text class="tab" x="732"  y="242" text-anchor="middle" font-size="13.5">SECOND MOVEMENT</text>
  <text class="tab" x="1152" y="242" text-anchor="middle" font-size="13.5">THIRD MOVEMENT</text>

  <!-- ================= the frame: three movement panels ================= -->
  <rect class="panel" x="80"  y="255" width="440" height="130" rx="4"/>
  <rect class="panel" x="552" y="255" width="360" height="130" rx="4"/>
  <rect class="panel" x="944" y="255" width="416" height="130" rx="4"/>

  <!-- panel 1 interior: vv.1-3 (dim) + the highlighted 1:4-5 unit -->
  <text class="lbl" x="220" y="326" text-anchor="middle" font-size="24">1:1–3</text>
  <text class="lbl" x="220" y="352" text-anchor="middle" font-size="14.5">the Word, the life</text>

  <!-- the highlighted unit -->
  <rect class="hl" x="362" y="257" width="156" height="126" rx="4"/>
  <text class="inkb" x="440" y="320" text-anchor="middle" font-size="27">1:4–5</text>
  <line class="rule" x1="388" y1="334" x2="492" y2="334"/>
  <text class="glab" x="440" y="360" text-anchor="middle" font-size="16">this unit</text>

  <text class="inkb" x="732"  y="328" text-anchor="middle" font-size="25">1:6–13</text>
  <text class="inkb" x="1152" y="328" text-anchor="middle" font-size="25">1:14–18</text>

  <!-- ================= movement descriptors (under the band) ================= -->
  <text class="desc" x="300"  y="418" text-anchor="middle" font-size="20">The Word in the beginning</text>
  <text class="desc" x="732"  y="418" text-anchor="middle" font-size="20">The Word coming as light</text>
  <text class="desc" x="1152" y="418" text-anchor="middle" font-size="20">The Word's glory in the flesh</text>
  <text class="lbl"  x="440"  y="443" text-anchor="middle" font-size="14.5">the foyer's close</text>

  <!-- ================= the macro-tense spine (diachronic, beneath) ================= -->
  <text class="note" x="90" y="490" text-anchor="start" font-size="16">the Prologue's tense-spine</text>
  <line class="spine" x1="80" y1="502" x2="1352" y2="502" marker-end="url(#ao-arrow)"/>

  <!-- the three spine forms at their locus (vv.1-3) -->
  <circle class="node" cx="150" cy="502" r="5"/>
  <circle class="node" cx="252" cy="502" r="5"/>
  <circle class="node" cx="356" cy="502" r="5"/>
  <text class="gk" x="150" y="532" text-anchor="middle" font-size="22">ἦν</text>
  <text class="gk" x="252" y="532" text-anchor="middle" font-size="22">ἐγένετο</text>
  <text class="gk" x="356" y="532" text-anchor="middle" font-size="22">ὃ γέγονεν</text>
  <path class="brk" d="M120 544 L120 550 L388 550 L388 544"/>
  <text class="lbl" x="254" y="570" text-anchor="middle" font-size="14.5">the spine begins · verses 1–3</text>

  <!-- diachronic reach to the incarnation -->
  <circle class="pring" cx="975" cy="502" r="6"/>
  <text class="lbl"  x="975"  y="530" text-anchor="middle" font-size="15">1:14</text>
  <text class="note" x="1150" y="530" text-anchor="middle" font-size="16">running diachronically, toward the incarnation</text>

  <!-- ================= frame title ================= -->
  <text class="ink" x="720" y="624" text-anchor="middle" font-size="30" letter-spacing="0.5">The Johannine Prologue</text>
  <text class="lbl" x="720" y="652" text-anchor="middle" font-size="16">John 1:4–5 · architectural orientation</text>
</svg>
