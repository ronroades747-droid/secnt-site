<svg viewBox="0 0 1440 940" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="gsTitle gsDesc" preserveAspectRatio="xMidYMid meet">
  <title id="gsTitle">The Gradatio Staircase of John 1:4–5.</title>
  <desc id="gsDesc">A four-step staircase in which each clause of John 1:4–5 takes up the last key word of the clause before it — life, light, darkness — and advances one step, from the life in the Word to the darkness's failure to overcome the light. Step one, verse 4a: in him was life (ἐν αὐτῷ ζωὴ ἦν), the register of ontology, handing on the word life. Step two, verse 4b, rising: and the life was the light of humanity (καὶ ἡ ζωὴ ἦν τὸ φῶς τῶν ἀνθρώπων), the register of anthropology, taking up life and handing on light. Step three, verse 5a, rising again: and the light shines in the darkness (καὶ τὸ φῶς ἐν τῇ σκοτίᾳ φαίνει), the register of cosmology, taking up light and handing on darkness. Step four, verse 5b, the top step: and the darkness did not overcome it (καὶ ἡ σκοτία αὐτὸ οὐ κατέλαβεν), the register of soteriology, taking up darkness and closing. The three catchword ties — life, light, darkness — carry the ascent. A note records Reading A, in which the clause "what has come to be" closes verse 3 and feeds the life-clause, letting the staircase begin cleanly.</desc>

  <style>
    /* --- family theming interface: light page renders from in-file fallbacks;
           dark slide renders when the host sets color / --color-gold / --color-meta --- */
    .gk       { font-family:'SBL BibLit','Cardo','Gentium Plus','Charis SIL','Source Serif 4',Georgia,serif; fill:currentColor; }
    .ink      { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:currentColor; }
    .lbl      { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); }
    .note     { font-family:'Source Serif 4','EB Garamond',Georgia,'Times New Roman',serif; fill:var(--color-meta,#6b6b6b); font-style:italic; }
    .cw       { fill:var(--color-goldtext,#8a6608); }
    .tlabel   { font-family:'Source Serif 4','EB Garamond',Georgia,serif; fill:var(--color-goldtext,#8a6608); letter-spacing:0.14em; }

    .step     { fill:none; stroke:currentColor; stroke-width:2; }
    .link     { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:2.4; stroke-linecap:round; }
    .lnode    { fill:var(--color-gold,#b8860b); }
    .ring     { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:1.8; }
    .ascent   { fill:none; stroke:var(--color-gold,#b8860b); stroke-width:2; stroke-linecap:round; }
    .feed     { fill:none; stroke:var(--color-meta,#6b6b6b); stroke-width:1.4; stroke-dasharray:4 4; stroke-linecap:round; }
    .ordnum   { font-family:'Source Serif 4',Georgia,serif; fill:var(--color-gold,#b8860b); }
  </style>

  <defs>
    <marker id="gs-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-gold,#b8860b)"/>
    </marker>
    <marker id="gs-arrow-meta" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-meta,#6b6b6b)"/>
    </marker>
  </defs>

  <!-- ===================== title block (top-left) ===================== -->
  <text class="ink"  x="90" y="74"  font-size="34">The Gradatio Staircase</text>
  <text class="lbl"  x="90" y="104" font-size="20">John 1:4–5 · the four clauses as a rising climax</text>
  <text class="note" x="90" y="132" font-size="18">Each clause takes up the last key word of the one before — <tspan class="gk cw" font-style="normal">ζωή</tspan>, <tspan class="gk cw" font-style="normal">φῶς</tspan>, <tspan class="gk cw" font-style="normal">σκοτία</tspan> — and climbs a step.</text>

  <!-- ===================== ascent guide (far left) ===================== -->
  <path class="ascent" d="M46 806 L46 548" marker-end="url(#gs-arrow)"/>
  <text class="lbl" x="30" y="682" font-size="16" text-anchor="middle" transform="rotate(-90 30 682)">the argument climbs · a gradatio</text>

  <!-- ===================== TREAD 1 · v.4a · ontology ===================== -->
  <rect class="step" x="90" y="700" width="540" height="120" rx="10"/>
  <circle class="ring"  cx="68" cy="760" r="15"/>
  <text  class="ordnum" x="68" y="766" text-anchor="middle" font-size="18">1</text>
  <text class="lbl"    x="112" y="730" font-size="17">v. 4a</text>
  <text class="tlabel" x="608" y="730" font-size="18" text-anchor="end">ONTOLOGY</text>
  <text class="gk"     x="360" y="774" font-size="28" text-anchor="middle">ἐν αὐτῷ <tspan class="cw">ζωὴ</tspan> ἦν</text>
  <text class="note"   x="360" y="802" font-size="17" text-anchor="middle">the life in the Word</text>

  <!-- ===================== TREAD 2 · v.4b · anthropology ===================== -->
  <rect class="step" x="340" y="520" width="540" height="120" rx="10"/>
  <circle class="ring"  cx="318" cy="580" r="15"/>
  <text  class="ordnum" x="318" y="586" text-anchor="middle" font-size="18">2</text>
  <text class="lbl"    x="362" y="550" font-size="17">v. 4b</text>
  <text class="tlabel" x="858" y="550" font-size="18" text-anchor="end">ANTHROPOLOGY</text>
  <text class="gk"     x="610" y="594" font-size="28" text-anchor="middle">καὶ ἡ <tspan class="cw">ζωὴ</tspan> ἦν τὸ <tspan class="cw">φῶς</tspan> τῶν ἀνθρώπων</text>
  <text class="note"   x="610" y="622" font-size="17" text-anchor="middle">the life, the light of humanity</text>

  <!-- ===================== TREAD 3 · v.5a · cosmology ===================== -->
  <rect class="step" x="590" y="340" width="540" height="120" rx="10"/>
  <circle class="ring"  cx="568" cy="400" r="15"/>
  <text  class="ordnum" x="568" y="406" text-anchor="middle" font-size="18">3</text>
  <text class="lbl"    x="612" y="370" font-size="17">v. 5a</text>
  <text class="tlabel" x="1108" y="370" font-size="18" text-anchor="end">COSMOLOGY</text>
  <text class="gk"     x="860" y="414" font-size="28" text-anchor="middle">καὶ τὸ <tspan class="cw">φῶς</tspan> ἐν τῇ <tspan class="cw">σκοτίᾳ</tspan> φαίνει</text>
  <text class="note"   x="860" y="442" font-size="17" text-anchor="middle">the light shines in the darkness</text>

  <!-- ===================== TREAD 4 · v.5b · soteriology ===================== -->
  <rect class="step" x="840" y="160" width="540" height="120" rx="10"/>
  <circle class="ring"  cx="818" cy="220" r="15"/>
  <text  class="ordnum" x="818" y="226" text-anchor="middle" font-size="18">4</text>
  <text class="lbl"    x="862" y="190" font-size="17">v. 5b</text>
  <text class="tlabel" x="1358" y="190" font-size="18" text-anchor="end">SOTERIOLOGY</text>
  <text class="gk"     x="1110" y="234" font-size="28" text-anchor="middle">καὶ ἡ <tspan class="cw">σκοτία</tspan> αὐτὸ οὐ κατέλαβεν</text>
  <text class="note"   x="1110" y="262" font-size="17" text-anchor="middle">the darkness does not overcome it</text>

  <!-- ===================== catchword ties (anadiplosis) ===================== -->
  <!-- ζωή : tread 1 -> tread 2 -->
  <circle class="lnode" cx="400" cy="700" r="4"/>
  <path class="link" d="M400 700 Q450 660 520 640" marker-end="url(#gs-arrow)"/>
  <circle class="lnode" cx="520" cy="640" r="4"/>
  <text class="gk cw" x="470" y="678" font-size="21" text-anchor="middle">ζωή</text>

  <!-- φῶς : tread 2 -> tread 3 -->
  <circle class="lnode" cx="700" cy="520" r="4"/>
  <path class="link" d="M700 520 Q740 480 790 460" marker-end="url(#gs-arrow)"/>
  <circle class="lnode" cx="790" cy="460" r="4"/>
  <text class="gk cw" x="738" y="498" font-size="21" text-anchor="middle">φῶς</text>

  <!-- σκοτία : tread 3 -> tread 4 -->
  <circle class="lnode" cx="980" cy="340" r="4"/>
  <path class="link" d="M980 340 Q1010 300 1050 280" marker-end="url(#gs-arrow)"/>
  <circle class="lnode" cx="1050" cy="280" r="4"/>
  <text class="gk cw" x="1010" y="318" font-size="21" text-anchor="middle">σκοτία</text>

  <!-- ===================== Reading A note (bottom-left, feeds tread 1) ===================== -->
  <path class="feed" d="M232 848 Q180 838 152 822" marker-end="url(#gs-arrow-meta)"/>
  <text class="note" x="96" y="866" font-size="16.5">Reading A · <tspan class="gk" font-style="normal">ὃ γέγονεν</tspan> closes v. 3 and feeds <tspan class="gk" font-style="normal">ἐν αὐτῷ ζωὴ ἦν</tspan> —</text>
  <text class="note" x="96" y="890" font-size="16.5">the punctuation that lets the staircase begin cleanly.</text>

  <!-- ===================== movement summary (bottom-right) ===================== -->
  <text class="ink"  x="1035" y="864" font-size="20" text-anchor="middle">life → light → darkness → the darkness's failure</text>
  <text class="note" x="1035" y="890" font-size="16.5" text-anchor="middle">the light shines; the darkness does not overcome it</text>
</svg>
